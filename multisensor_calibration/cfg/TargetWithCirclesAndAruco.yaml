%YAML:1.0
board_width: 0.9        # 1.2m * 0.75
board_height: 0.6       # 0.8m * 0.75
marker_size: 0.135      # 0.18m * 0.75
marker_ids:             
    rows: 4
    cols: 1
    dt: i
    data: [1, 2, 3, 4]  # Clockwise: TL, TR, BR, BL
marker_positions:       # Top-left corner of each marker relative to center (0,0)
    rows: 4
    cols: 2
    dt: f
    data: [-0.413, 0.263,   # Marker 1 (Top-Left)
           0.278, 0.263,    # Marker 2 (Top-Right)
           0.278, -0.128,   # Marker 3 (Bottom-Right)
           -0.413, -0.128]  # Marker 4 (Bottom-Left)
cutouts:                
    rows: 1
    cols: 16            # Increased to 16 for 4 cutouts (4 parameters each)
    dt: f
    data: [1, -0.1125, 0.1125, 0.09,   # ID, X, Y, Radius
           1, 0.1125, 0.1125, 0.09,    # Added 4th cutout for symmetry
           1, 0.1125, -0.1125, 0.09,   
           1, -0.1125, -0.1125, 0.09]  
min_marker_detection: 2 
cad_model_mesh: "calibration_target_4holes_cad_mesh.ply" 
cad_model_cloud: "calibration_target_4holes_cad_cloud.ply"
